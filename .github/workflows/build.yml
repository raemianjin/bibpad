name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 소스 코드 가져오기
        uses: actions/checkout@v4

      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle 설정
        uses: gradle/actions/setup-gradle@v3

      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      - name: 디버그 APK 빌드
        run: ./gradlew assembleDebug --no-daemon

      - name: APK 이름 변경
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/bible.apk

      - name: APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: BibleApp-debug-apk
          path: app/build/outputs/apk/debug/bible.apk
          if-no-files-found: error
